name: Update Dependency on Publish

on:
  repository_dispatch:
    types: [kschema_published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update dependency to latest
        run: npm install kschema-api-gen-endpointsjs@latest

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update kschema-api-gen-endpointsjs dependency"
          title: "chore: update kschema-api-gen-endpointsjs dependency"
          body: "This automated PR updates the `kschema-api-gen-endpointsjs` dependency to the latest version in response to the publish event."
          branch: "update-kschema-dependency"
